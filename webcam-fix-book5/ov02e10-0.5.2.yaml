# SPDX-License-Identifier: CC0-1.0
# Tuning file for OmniVision OV02E10 on Intel IPU7 (Lunar Lake)
# Used by libcamera's Simple pipeline handler / Software ISP
#
# Multi-temperature CCM tuning by @david-bartlett.
# 3-anchor tuning for libcamera 0.5.x (uses Lut, not Adjust).
# Anchors: 3200K, 4000K, 6500K
#
# For libcamera 0.6.0+ use ov02e10.yaml instead.
%YAML 1.1
---
version: 1
algorithms:
  - BlackLevel:
      # OV02E10 optical-black pedestal: same 10-bit OmniVision family as the
      # OV02C10, so the same 64-code (= 4096 in 16-bit) pedestal. Anchors the
      # black level so the SoftISP's dynamic estimator can't drift toward 0 in
      # low-light noise and leave the pedestal unsubtracted (gray instead of
      # black). Value by analogy with the OV02C10 fix confirmed in issue #71;
      # adjust if a Book5 owner measures a different pedestal.
      blackLevel: 4096
  - Awb:
  - Ccm:
      ccms:
        - ct: 3200
          ccm: [  1.44, -0.12, -0.08,
                 -0.10,  1.62, -0.25,
                 -0.05, -0.28,  1.6 ]
        - ct: 4000
          ccm: [  1.38, -0.10, -0.05,
                 -0.15,  1.6, -0.10,
                 -0.15, -0.15,  1.56 ]
        - ct: 6500
          ccm: [  1.4, -0.04, -0.06,
                  0,     0.66,  0.1,
                 -0.02, -0.2,   1.2 ]
  - Lut:
  - Agc:
...
